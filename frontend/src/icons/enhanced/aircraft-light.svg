<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Light prop plane, top-down view, nose up. Blue fill, black stroke -->
  <!-- Fuselage (small, rounded) -->
  <path d="M24 6 C22.8 6 22 8 22 10 L22 36 C22 39 23 42 24 43 C25 42 26 39 26 36 L26 10 C26 8 25.2 6 24 6 Z" fill="#60a5fa" stroke="#1a1a1a" stroke-width="0.9"/>
  <!-- Fuselage center line -->
  <line x1="24" y1="8" x2="24" y2="41" stroke="#2563eb" stroke-width="0.4"/>

  <!-- Propeller circle at nose -->
  <circle cx="24" cy="5" r="3.5" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="24" cy="5" r="0.8" fill="#1e40af" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Propeller blades (blur disc) -->
  <ellipse cx="24" cy="5" rx="3.2" ry="0.6" fill="#93c5fd" opacity="0.3"/>
  <ellipse cx="24" cy="5" rx="0.6" ry="3.2" fill="#93c5fd" opacity="0.3"/>

  <!-- Cockpit windows -->
  <rect x="22.8" y="10" width="2.4" height="3.5" rx="1" fill="#67e8f9" stroke="#1a1a1a" stroke-width="0.4" opacity="0.8"/>
  <line x1="24" y1="10" x2="24" y2="13.5" stroke="#1a1a1a" stroke-width="0.3"/>

  <!-- High straight wings -->
  <path d="M22 18 L3 19 L2.5 21 L3.5 21.5 L22 20.5 Z" fill="#60a5fa" stroke="#1a1a1a" stroke-width="0.8"/>
  <path d="M26 18 L45 19 L45.5 21 L44.5 21.5 L26 20.5 Z" fill="#60a5fa" stroke="#1a1a1a" stroke-width="0.8"/>
  <!-- Wing strut lines -->
  <line x1="22" y1="19.5" x2="10" y2="19.8" stroke="#2563eb" stroke-width="0.4"/>
  <line x1="26" y1="19.5" x2="38" y2="19.8" stroke="#2563eb" stroke-width="0.4"/>

  <!-- Fixed landing gear (small struts under wings) -->
  <line x1="18" y1="20" x2="18" y2="23" stroke="#374151" stroke-width="0.8"/>
  <circle cx="18" cy="23.5" r="0.8" fill="#374151" stroke="#1a1a1a" stroke-width="0.3"/>
  <line x1="30" y1="20" x2="30" y2="23" stroke="#374151" stroke-width="0.8"/>
  <circle cx="30" cy="23.5" r="0.8" fill="#374151" stroke="#1a1a1a" stroke-width="0.3"/>

  <!-- Horizontal stabilizer -->
  <path d="M23 37 L16 38.5 L16 40 L17 40.2 L23 39 Z" fill="#60a5fa" stroke="#1a1a1a" stroke-width="0.6"/>
  <path d="M25 37 L32 38.5 L32 40 L31 40.2 L25 39 Z" fill="#60a5fa" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- Vertical stabilizer (top-down = narrow rect) -->
  <rect x="23.2" y="37" width="1.6" height="5" rx="0.5" fill="#93c5fd" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Tail wheel -->
  <circle cx="24" cy="42.5" r="0.5" fill="#374151"/>
</svg>
