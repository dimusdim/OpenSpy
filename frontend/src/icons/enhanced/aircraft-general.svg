<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- General aviation mid-size plane, top-down view, nose up. Gray fill, black stroke -->
  <!-- Fuselage (mid-size, slightly wider than light) -->
  <path d="M24 4 C22.5 4 21.5 6 21.5 8 L21.5 35 C21.5 38 22.5 42 24 44 C25.5 42 26.5 38 26.5 35 L26.5 8 C26.5 6 25.5 4 24 4 Z" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="0.9"/>
  <!-- Fuselage center line -->
  <line x1="24" y1="6" x2="24" y2="42" stroke="#9ca3af" stroke-width="0.4"/>

  <!-- Nose tip -->
  <path d="M23 6 L24 3.5 L25 6 Z" fill="#d1d5db" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Cockpit windows -->
  <rect x="22.5" y="8" width="3" height="3" rx="1" fill="#67e8f9" stroke="#1a1a1a" stroke-width="0.4" opacity="0.8"/>
  <line x1="24" y1="8" x2="24" y2="11" stroke="#1a1a1a" stroke-width="0.3"/>

  <!-- Cabin windows (small row) -->
  <circle cx="22.2" cy="14" r="0.4" fill="#67e8f9" opacity="0.5"/>
  <circle cx="22.2" cy="16" r="0.4" fill="#67e8f9" opacity="0.5"/>
  <circle cx="22.2" cy="18" r="0.4" fill="#67e8f9" opacity="0.5"/>
  <circle cx="25.8" cy="14" r="0.4" fill="#67e8f9" opacity="0.5"/>
  <circle cx="25.8" cy="16" r="0.4" fill="#67e8f9" opacity="0.5"/>
  <circle cx="25.8" cy="18" r="0.4" fill="#67e8f9" opacity="0.5"/>

  <!-- Moderate swept wings (shorter than airliner) -->
  <path d="M21.5 19 L6 25 L6 27 L7.5 27.3 L21.5 22 Z" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="0.8"/>
  <path d="M26.5 19 L42 25 L42 27 L40.5 27.3 L26.5 22 Z" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="0.8"/>
  <!-- Wing panel lines -->
  <line x1="14" y1="23" x2="21.5" y2="20" stroke="#9ca3af" stroke-width="0.4"/>
  <line x1="34" y1="23" x2="26.5" y2="20" stroke="#9ca3af" stroke-width="0.4"/>

  <!-- Single engine (nacelle on each side, close to fuselage) -->
  <ellipse cx="17" cy="23.5" rx="1.2" ry="2" fill="#d1d5db" stroke="#1a1a1a" stroke-width="0.5"/>
  <ellipse cx="31" cy="23.5" rx="1.2" ry="2" fill="#d1d5db" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Horizontal stabilizer -->
  <path d="M22.5 37 L15 39 L15 40.5 L16 40.8 L22.5 39 Z" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="0.6"/>
  <path d="M25.5 37 L33 39 L33 40.5 L32 40.8 L25.5 39 Z" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- Vertical stabilizer (single tail) -->
  <rect x="23" y="37" width="2" height="5" rx="0.5" fill="#d1d5db" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- Door outline -->
  <rect x="21.8" y="12" width="1.5" height="2.5" rx="0.3" fill="none" stroke="#9ca3af" stroke-width="0.3"/>
</svg>
