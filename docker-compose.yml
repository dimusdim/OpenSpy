services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: openspy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openspy"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3055:3055"
    env_file:
      - ./backend/.env
    environment:
      - PORT=3055
      - POSTGRES_ENABLED=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/openspy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    command: npx ts-node src/index.ts
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3737:3737"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3055
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
